<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School Management System</title>
    <!-- Core Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Phosphor Icons (Modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="ph ph-graduation-cap"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your admin account</p>
            </div>

            <div id="login-alert" class="alert alert-danger"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username / Email</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="admin@school.edu" required autofocus>
                </div>

                <div class="form-group">
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--primary-color); text-decoration: none;">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary btn-block mt-4">
                    <span id="btn-text">Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="assets/js/main.js"></script>
</body>
</html>
