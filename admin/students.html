<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - School Management System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="auth-logo" style="width: 32px; height: 32px; margin: 0; border-radius: 8px;">
                    <i class="ph ph-graduation-cap" style="font-size: 1.25rem;"></i>
                </div>
                <span>Sch-MS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item active">
                    <i class="ph ph-users"></i> Students
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="ph ph-chalkboard-teacher"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item">
                    <i class="ph ph-books"></i> Classes & Subjects
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="ph ph-chart-bar"></i> Reports
                </a>
                <a href="../index.html" class="nav-item" style="margin-top: auto; color: var(--danger-color);">
                    <i class="ph ph-sign-out"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); background: var(--bg-surface-hover); padding: 0.5rem 1rem; border-radius: 999px;">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search students..." style="border: none; outline: none; background: transparent; font-family: inherit; width: 250px;">
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                    <i class="ph ph-bell" style="font-size: 1.25rem; color: var(--text-secondary); cursor: pointer;"></i>
                    <div style="width: 36px; height: 36px; border-radius: 50%; background-color: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                        A
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="flex justify-between items-center mb-4">
                    <h2>Student Management</h2>
                    <button class="btn btn-primary" onclick="openModal('addStudentModal')"><i class="ph ph-plus" style="margin-right: 0.5rem;"></i> Add New Student</button>
                </div>
                
                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <div style="display: flex; gap: 1rem;">
                            <select class="form-control" style="width: 150px; padding: 0.5rem;">
                                <option>All Classes</option>
                                <option>Grade 10</option>
                                <option>Grade 11</option>
                                <option>Grade 12</option>
                            </select>
                            <select class="form-control" style="width: 150px; padding: 0.5rem;">
                                <option>Status: All</option>
                                <option>Active</option>
                                <option>Pending</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Class</th>
                                    <th>Parent Contact</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#STU-001</td>
                                    <td>Sarah Jenkins</td>
                                    <td>Grade 10 - Science</td>
                                    <td>+1 555-0123</td>
                                    <td><span style="background: #dcfce3; color: #10b981; padding: 0.25rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600;">Active</span></td>
                                    <td>
                                        <button class="btn btn-sm" style="background: transparent; color: var(--primary-color); padding: 0.25rem; border: none; cursor: pointer;"><i class="ph ph-pencil-simple" style="font-size: 1.25rem;"></i></button>
                                        <button class="btn btn-sm" style="background: transparent; color: var(--danger-color); padding: 0.25rem; border: none; cursor: pointer;"><i class="ph ph-trash" style="font-size: 1.25rem;"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>#STU-002</td>
                                    <td>Michael Chang</td>
                                    <td>Grade 8 - Arts</td>
                                    <td>+1 555-0124</td>
                                    <td><span style="background: #dcfce3; color: #10b981; padding: 0.25rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600;">Active</span></td>
                                    <td>
                                        <button class="btn btn-sm" style="background: transparent; color: var(--primary-color); padding: 0.25rem; border: none; cursor: pointer;"><i class="ph ph-pencil-simple" style="font-size: 1.25rem;"></i></button>
                                        <button class="btn btn-sm" style="background: transparent; color: var(--danger-color); padding: 0.25rem; border: none; cursor: pointer;"><i class="ph ph-trash" style="font-size: 1.25rem;"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Student Modal -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Student</h3>
                <span class="close" onclick="closeModal('addStudentModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="add-student-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="student_name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <select id="class_id" class="form-control" required>
                            <option value="">Select Class...</option>
                            <!-- Will be populated dynamically -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parent Contact</label>
                        <input type="text" id="parent_contact" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4">Save Student</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
