<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes Management - School Management System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="auth-logo" style="width: 32px; height: 32px; margin: 0; border-radius: 8px;">
                    <i class="ph ph-graduation-cap" style="font-size: 1.25rem;"></i>
                </div>
                <span>Sch-MS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item">
                    <i class="ph ph-users"></i> Students
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="ph ph-chalkboard-teacher"></i> Teachers
                </a>
                <a href="classes.html" class="nav-item active">
                    <i class="ph ph-books"></i> Classes & Subjects
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="ph ph-chart-bar"></i> Reports
                </a>
                <a href="../index.html" class="nav-item" style="margin-top: auto; color: var(--danger-color);">
                    <i class="ph ph-sign-out"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); background: var(--bg-surface-hover); padding: 0.5rem 1rem; border-radius: 999px;">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search classes..." style="border: none; outline: none; background: transparent; font-family: inherit; width: 250px;">
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                    <i class="ph ph-bell" style="font-size: 1.25rem; color: var(--text-secondary); cursor: pointer;"></i>
                    <div style="width: 36px; height: 36px; border-radius: 50%; background-color: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                        A
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="flex justify-between items-center mb-4">
                    <h2>Classes & Subjects</h2>
                    <button class="btn btn-primary" onclick="openModal('addClassModal')"><i class="ph ph-plus" style="margin-right: 0.5rem;"></i> Add New Class</button>
                </div>
                
                <div class="card">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Class ID</th>
                                    <th>Name</th>
                                    <th>Grade Level</th>
                                    <th>Date Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="classes-table-body">
                                <tr>
                                    <td colspan="5" class="text-center">Loading classes...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Class Modal -->
    <div id="addClassModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Class</h3>
                <span class="close" onclick="closeModal('addClassModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="add-class-form">
                    <div class="form-group">
                        <label class="form-label">Class Name</label>
                        <input type="text" id="class_name" class="form-control" placeholder="e.g. Grade 10 - Science" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Grade Level</label>
                        <input type="text" id="grade_level" class="form-control" placeholder="e.g. 10" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4">Save Class</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
